title: "Unity Money Transfer"
blocks:
  - type: image
    src: /media/projects/unitymt/cover.png
    alt: "Скриншот главного экрана"

  - type: text
    title: "О проекте"
    body: |
      Unity Money Transfer — это веб-платформа для быстрых и безопасных денежных переводов между Нидерландами и рядом стран Африки. Цель проекта — упростить международные переводы, сделав акцент на прозрачности, скорости и удобстве использования для разных групп пользователей (иностранные специалисты, семьи и малый бизнес).

  - type: text
    links:
      - label: Behance
        url: "https://www.behance.net/gallery/234804767/Money-Transfer-Website"
  - type: divider

# ── Текст: заголовок + подзаголовок + буллеты ───────────────────────────
  - type: text
    title: "Проблемы"
    bullets:
      - 'Перегруженные и запутанные пользовательские сценарии, нужно провести пользователя до конца без потерь'
      - 'Сложность понимания комиссий и итоговой суммы перевода'
      - 'Разный уровень грамотности у целевой аудитории'
      - 'Низкий уровень доверия к онлайн-переводам, особенно при международных транзакциях: продукт требует ощущения надежности и прозрачности'
  
  - type: divider

  - type: text
    title: "Решение"
    bullets:
      - 'Провела UX-исследование: изучила аудиторию, сценарии использования, чтобы выстроить логику под реальный уровень пользователя'    
      - 'Разработала конвертер на главной странице как ключевой элемент вовлечения: пользователь сразу видит курс и выгоду'
      - 'Упростила сценарий отправки денег до линейного пошагового флоу'
      - 'Спроектировала UI-систему с акцентом на безопасность и доверие: минимум отвлекающих элементов, акценты на ключевых действиях'

  

  - type: divider

