title: "Белгородсоцбанк"
blocks:

  - type: image
    src: /media/projects/bsb/cover.png
    alt: "Скриншот главного экрана"

  - type: text
    title: "О проекте"
    body: |
      Белгородсоцбанк — региональный банк с 30-летней историей, обслуживающий физических и юридических лиц. Сайт был морально и визуально устаревшим: не отражал доверие к бренду и не отвечал ожиданиям современного пользователя. Задача — редизайн с сохранением структуры некоторых продуктов, добавлением новых, а также переосмыслением подачи и навигации.

  - type: text
    links:
      - label: Ссылка
        url: https://bsbank.ru

  - type: divider

  - type: text
    title: "Проблемы"
    bullets:
      - Устаревший визуальный язык, не соответствующий уровню финансового бренда
      - "Запутанная навигация: неочевидные пользовательские сценарии и путь к целевому действию"
      - Отсутствие чёткой иерархии — важная информация терялась среди второстепенной
      - Сайт не был адаптирован под мобильные устройства и планшеты
      - "Низкое доверие к интерфейсу: для банка критично ощущение надёжности, которого не было"

  - type: divider

  - type: text
    title: "Решения"
    bullets:
      - "Провела UX-аудит старого сайта: зафиксировала проблемы навигации и несоответствия пользовательским ожиданиям"
      - Разработала новый визуальный язык — строгий, современный, с акцентом на доверие и читаемость
      - Создала библиотеку компонентов для консистентности интерфейса на всех страницах
      - Пересмотрела информационную архитектуру, продумала понятные CTA и пользовательский флоу

  - type: divider

  - type: text
    title: "Структура сайта"
    bullets:
      - Раздел для физических лиц (вклады, банковские карты, кредитование, СБП, регистрация в ЕБС/ЕСИА, индивидуальные сейфы, информация о процентных ставках)
      - Раздел для юридических лиц (кредит, гарантии, факторинг, ВЭД, расчетный счет, депозиты, дистанционное банковское обслуживание)
      - Интернет-банкинг
      - Акционерам
      - Партнерам
      - О банке
      - Отчетность
      - Контакты

  - type: divider

  - type: text
    title: "Результаты"
    bullets:
      - Визуальный язык приведён в соответствие с ожиданиями от финансового продукта
      - Сокращён путь пользователя до ключевых действий за счёт упрощения структуры
      - Проект реализован в рамках сроков и без потери качества на этапе передачи

  - type: divider

  - type: image
    title: "Главные страницы (физические и юридические лица)"
    subtitle: "Введено визуальное разделение аудиторий: светлая тема — для физических лиц и общих разделов, тёмная — для юридических лиц. Это позволяет пользователю мгновенно определить нужный раздел без дополнительного когнитивного усилия."
