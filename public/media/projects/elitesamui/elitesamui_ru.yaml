title: "Elite Samui"
blocks:
  - type: image
    src: /media/projects/elitesamui/cover.png
    alt: "Скриншот главного экрана"

  - type: text
    title: "О проекте"
    body: |
      Elite Samui — сайт для сервиса аренды и продажи премиальных вилл на острове Самуи, Таиланд. Основная цель — представить объекты недвижимости как желанный  и доступный lifestyle-продукт и упростить процесс поиска и покупки/бронирования для международной аудитории.

  - type: text
    links:
      - label: Behance
        url: "https://www.behance.net/gallery/223476257/Elite-Samui-Responsive-Web-Design"
  - type: divider

# ── Текст: заголовок + подзаголовок + буллеты ───────────────────────────
  - type: text
    title: "Задачи"
    bullets:
      - "Создание фирменного стиля"
      - 'Аудитория — международные покупатели, которые принимают решение о дорогостоящей покупке удалённо: сайт должен заменить личный визит и сформировать доверие'
      - 'Несколько типов предложений — виллы на продажу, аренда, земельные участки — нужно структурировать так, чтобы пользователь быстро нашёл своё'
      - 'Большое количество объектов с разными параметрами (локация, цена, размер, удобства)'
      - 'Конечная цель — не онлайн-покупка, а контакт с командой: весь интерфейс должен вести к этому действию'
  
  - type: divider

  - type: text
    title: "Решения"
    bullets:
      - 'Разработала логотип с нуля: создала визуальную идентификацию бренда, которая транслирует премиальность и органично вписывается в общий дизайн сайта'    
      - 'Разделила продукты по типу предложения — виллы на продажу, аренда, земля — с отдельными каталогами под каждый'
      - 'Создала минималистичный визуальный язык с упором на фотографию и пространство — без перегруза элементами'
      - 'Добавила понятные CTA для бронирования и отправки заявки'

  - type: divider

  - type: text
    title: "Структура сайта"
    bullets:
      - 'Главная'    
      - 'Виллы на продажу'
      - 'Аренда вилл'
      - 'Карточка виллы (галерея, описание, удобства, локация, цена)'
      - 'Земля на продажу'
      - 'FAQ' #no faqu
      - 'Контактная информация'

  - type: image
    title: "Главная страница"
    src: /media/projects/elitesamui/main.png
    alt: "Главная страница"
    
  - type: image
    title: "Десктопная и мобильная версии"
    src: /media/projects/elitesamui/versions.png
    alt: "Десктопная и мобильная версии"

  - type: image
    title: "Виллы для продажи"
    src: /media/projects/elitesamui/sell.png
    alt: "Виллы для продажи"

  - type: image
    title: "Виллы для аренды"
    src: /media/projects/elitesamui/rent.png
    alt: "Виллы для аренды"

  # ── Картинка с заголовком и текстом сверху ──────────────────────────────
  - type: image
    title: "Стиль проекта"
    subtitle: "Была выбрана чистая и сдержанная цветовая палитра. Она отражает премиальный уровень вилл — ненавязчиво, но с ощущением статуса. В проекте используются лаконичные и визуально выразительные шрифты, тщательно подобранные для поддержания простоты и эстетики."
    src: /media/projects/elitesamui/ds.png
    alt: "Стиль проекта"

  - type: image
    title: "Мобильные экраны"
    src: /media/projects/elitesamui/mobile.png
    alt: "Мобильные экраны"

  - type: text
    title: "Результаты"
    bullets:
      - 'Создан сайт с нуля: от архитектуры и исследования до финального UI'    
      - 'Повысилась наглядность и привлекательность объектов за счёт визуальной подачи'
      - 'Упростился процесс поиска и выбора вилл для покупки и аренды'
      - 'Структура сайта выстроена под конверсию в контакт — ключевое целевое действие для продаж недвижимости'
   
