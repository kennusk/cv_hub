title: "Vipsy"
blocks:
  - type: image
    src: /media/projects/vipsy/cover.png
    alt: "Скриншот главного экрана"

  - type: text
    title: "О проекте"
    body: |
      Vipsy — мобильное приложение для подбора психолога и направления терапии. Продукт помогает пользователю не только найти специалиста, но и разобраться, какое направление ему подходит. Задача — провести человека от размытого «мне нужна помощь» до конкретной записи к подходящему специалисту.

  - type: text
    links:
      - label: App Store
        url: "https://apps.apple.com/ru/app/vipsy-%D0%BF%D1%81%D0%B8%D1%85%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8-%D0%BE%D0%BD%D0%BB%D0%B0%D0%B9%D0%BD/id6478947781?l=en-GB"
  - type: divider

# ── Текст: заголовок + подзаголовок + буллеты ───────────────────────────
  - type: text
    title: "Проблемы"
    bullets:
      - Пользователь часто не знает ни специалиста, ни направление — приложение должно помочь с выбором, не перегружая и не требуя предварительных знаний
      - 'Недоверие к специалистам и онлайн-формату консультаций, сложность сравнения'
      - 'Сложная логика монетизации: нужно понятно подать как разовые сеансы, так и абонементы'
      - Личный кабинет должен покрывать управление записями, историю сеансов и покупки  без перегруза
  
  - type: divider

  - type: text
    title: "Решение"
    bullets:
      - 'Спроектировала двойной сценарий подбора: пользователь может выбрать направление терапии или услугу — и получить специалистов под них, или сразу записаться к определенному специалисту, выбрав конкретную услугу у него'    
      - 'Разработала карточку специалиста с акцентом на доверие: направления работы, подход, опыт, услуги — всё на одном экране без лишних переходов'
      - 'Выстроила понятную логику покупки: разовая сессия и абонемент визуально разделены, а также внедрила удобный сценарий записи на консультацию'
      - 'Спроектировала личный кабинет с разделением на активные записи, историю и покупки'
      - 'Создала визуально спокойный и безопасный интерфейс, снижающий тревожность'

  - type: divider

  - type: text
    title: "Результаты"
    bullets:
      - 'Выстроен полный пользовательский путь от первого экрана до подтверждённой записи'    
      - 'Упростился процесс выбора специалиста и направления за счёт структурированной подачи информации'
      - 'Интерфейс стал восприниматься как спокойный и безопасный для пользователя'
      - 'Продукт реализован как коммерческий заказ в рамках согласованных сроков'

  - type: divider

