title: "Vipsy"
blocks:
  - type: image
    src: /media/projects/vipsy/cover.png
    alt: "Main screen screenshot"

  - type: text
    title: "About the Project"
    body: |
      Vipsy is a mobile app for finding a therapist and selecting a therapy approach. The product helps users not only find a specialist, but also understand which approach suits them. The goal is to guide a user from a vague “I need help” state to a confirmed booking with the right specialist.

  - type: text
    links:
      - label: App Store
        url: "https://apps.apple.com/ru/app/vipsy-%D0%BF%D1%81%D0%B8%D1%85%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8-%D0%BE%D0%BD%D0%BB%D0%B0%D0%B9%D0%BD/id6478947781?l=en-GB"
  - type: divider

# ── Текст: заголовок + подзаголовок + буллеты ───────────────────────────
  - type: text
    title: "Challenges"
    bullets:
      - Users often don’t know the specialist or the therapy type — the app must guide selection without overload or prior knowledge
      - 'Low trust in specialists and online consultations; difficult to compare options'
      - 'Complex monetization logic: both one-off sessions and subscriptions must be clearly presented'
      - The account area must cover bookings, session history, and purchases without clutter
  
  - type: divider

  - type: text
    title: "Solution"
    bullets:
      - 'Designed a dual discovery flow: users can pick a therapy direction or a service to get matched specialists, or book directly with a chosen specialist by selecting a specific service'
      - 'Created a specialist profile focused on trust: areas, approach, experience, services — all on one screen with minimal navigation'
      - 'Built a clear purchase logic: one-off sessions and subscriptions are visually separated; streamlined the booking flow'
      - 'Designed the account area with sections for active bookings, history, and purchases'
      - 'Crafted a calm, safety-oriented UI to reduce anxiety'

  - type: divider

  - type: text
    title: "Results"
    bullets:
      - 'Established a complete user journey from first screen to confirmed booking'
      - 'Simplified selection of specialists and therapy types through structured information'
      - 'The interface is perceived as calm and safe'
      - 'Delivered as a commercial project within agreed timelines'

  - type: divider

