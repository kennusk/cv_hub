  # ── Картинка с заголовком и текстом сверху ──────────────────────────────
  - type: image
    title: "Booking a Session"
    subtitle: "Flexible booking flow: users can pick a time immediately or proceed without selecting a time and return to the schedule later. This lowers the entry barrier and retains users who aren’t ready to commit to a specific date."
    src: /media/projects/vipsy/record.png
    alt: "Booking a session"

  - type: image
    title: "Purchase a Service"
    subtitle: "Multiple scenarios are supported: purchase without selecting a time and book later, or choose a specialist and a convenient slot immediately. Subscriptions are purchased without time selection, then activated in the account, after which users schedule sessions themselves."
    src: /media/projects/vipsy/buy.png
    alt: "Purchase a service"

  - type: image
    title: "My Services"
    subtitle: "All purchased services are split into active and archived. From active services, users can book a session if time wasn’t selected during purchase. Rescheduling, cancellation, and subscription activation are available. All session management is centralized in one place."
    src: /media/projects/vipsy/serv.png
    alt: "My services"
   
