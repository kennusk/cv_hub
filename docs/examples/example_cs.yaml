# CV Hub — Case Study YAML example
#
# Файл кейс стади живёт по пути:
#   public/media/projects/{slug}/{slug_underscored}_{lang}.yaml
#
# Пример: public/media/projects/my-project/my_project_ru.yaml
#         public/media/projects/my-project/my_project_en.yaml
#
# Страница генерируется автоматически при наличии файла.
# URL: /showcase/{slug}          ← дефолтный язык
#      /showcase/{slug}/en       ← остальные языки

title: "My Project"
role: "Lead Developer"          # Отображается под заголовком (опционально)
year: "2024"                    # Год (опционально)
tagline: "Короткое описание под заголовком на странице кейса."
shareable: true                 # Показывать ли ссылку на копирование (опционально)

platforms: [iOS, Android]
stack: [Unity, C#, Photon, Node.js]

links:
  - label: App Store
    url: https://apps.apple.com/...
  - label: Play Store
    url: https://play.google.com/...
  - label: GitHub
    url: https://github.com/...

blocks:

  # ── Картинка без текста ─────────────────────────────────────────────────
  - type: image
    src: /media/projects/my-project/cover.png
    alt: "Скриншот главного экрана"

  # ── Картинка с подписью ─────────────────────────────────────────────────
  - type: image
    src: /media/projects/my-project/screenshot.jpg
    alt: "Геймплей"
    caption: "Основной игровой экран"

  # ── Картинка с заголовком и текстом сверху ──────────────────────────────
  - type: image
    title: "Архитектура системы"
    subtitle: "Схема взаимодействия сервисов"
    src: /media/projects/my-project/architecture.png
    alt: "Архитектурная схема"
    body: |
      Дополнительный текст над картинкой. Поддерживает переносы строк.

  # ── Разделитель ─────────────────────────────────────────────────────────
  - type: divider

  # ── Текст: только заголовок и параграф ──────────────────────────────────
  - type: text
    title: "Overview"
    body: |
      Многострочный текст пишется сюда.
      Поддерживает переносы строк.

  # ── Текст: заголовок + подзаголовок + буллеты ───────────────────────────
  - type: text
    title: "What I did"
    subtitle: "Ключевые задачи на проекте"
    bullets:
      - Разработал серверную архитектуру
      - Внедрил CI/CD пайплайн
      - Оптимизировал рендер, +45% FPS

  # ── Текст: только буллеты без заголовка ─────────────────────────────────
  - type: text
    bullets:
      - Первый пункт
      - Второй пункт

  # ── Текст со ссылками внизу блока ───────────────────────────────────────
  - type: text
    title: "Resources"
    body: "Полезные материалы по проекту."
    links:
      - label: Документация
        url: https://docs.example.com
      - label: Статья на Medium
        url: https://medium.com/...

  # ── Текст: только параграф без заголовка ────────────────────────────────
  - type: text
    body: |
      Просто текст без заголовка.
      Можно использовать как подпись или вводный абзац.